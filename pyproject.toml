[project]
name = "agentic-clustering-benchmarking"
version = "0.1.0"
description = "Benchmark experiments for the agentic-clustering Claude Code plugin"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Emily Silcock", email = "emilysilcock@gmail.com" },
    { name = "Simon Löwe", email = "loewe.sim@gmail.com" },
]
dependencies = [
    "datasets>=2.18",
    "scikit-learn>=1.4",
    "truststore>=0.10 ; sys_platform == 'win32'",
    "gdown>=5.2",
    "sentence-transformers>=2.7",
    "bertopic>=0.16",
    "openai>=1.40",
    "tiktoken>=0.7",
    "h5py>=3.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["benchmarking"]
